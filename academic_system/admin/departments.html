<!DOCTYPE html>
<html lang="en" class="h-full bg-white antialiased">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <meta name="description" content="AcademicSync - Smart Academic Management">
    <title>AcademicSync - Departments</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://cdn.lineicons.com/4.0/lineicons.css" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#f9fafb',
                            100: '#f3f4f6',
                            200: '#e5e7eb',
                            300: '#d1d5db',
                            400: '#9ca3af',
                            500: '#6b7280',
                            600: '#000000',
                            700: '#1f2937',
                            800: '#111827',
                            900: '#000000',
                        },
                        gray: {
                            50: '#f9fafb',
                            100: '#f3f4f6',
                            200: '#e5e7eb',
                            300: '#d1d5db',
                            400: '#9ca3af',
                            500: '#6b7280',
                            600: '#4b5563',
                            700: '#374151',
                            750: '#2d3748',
                            800: '#1f2937',
                            900: '#111827',
                            55: '#f9fafb',
                        }
                    },
                    boxShadow: {
                        'sm': '0 1px 2px 0 rgba(0, 0, 0, 0.05)',
                        'DEFAULT': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                        'md': '0 4px 12px rgba(0, 0, 0, 0.05)',
                        'lg': '0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.03)',
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/components/scrollbar.css">
    <!-- API must load before Alpine so component fn can reference it -->
    <script src="../assets/js/api.js?v=2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .skeleton { background: linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; }
        .dark .skeleton { background: linear-gradient(90deg,#374151 25%,#4b5563 50%,#374151 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    </style>
</head>

<body class="h-full flex overflow-hidden font-sans antialiased bg-gray-50 dark:bg-gray-900 dark:text-gray-300 transition-colors duration-200"
    x-data="deptPage()" x-init="init()" :class="darkMode ? 'dark' : ''" x-cloak>

    <!-- Toast Notifications -->
    <div class="fixed top-4 right-4 z-[200] space-y-2 pointer-events-none" aria-live="polite">
        <template x-for="toast in toasts" :key="toast.id">
            <div x-show="toast.visible"
                x-transition:enter="transition ease-out duration-300"
                x-transition:enter-start="opacity-0 translate-x-8"
                x-transition:enter-end="opacity-100 translate-x-0"
                x-transition:leave="transition ease-in duration-200"
                x-transition:leave-start="opacity-100"
                x-transition:leave-end="opacity-0 translate-x-8"
                class="pointer-events-auto flex items-start gap-3 w-80 p-4 rounded-xl shadow-xl border bg-white dark:bg-gray-800"
                :class="{'border-green-200 dark:border-green-800':toast.type==='success','border-red-200 dark:border-red-800':toast.type==='error','border-blue-200 dark:border-blue-800':toast.type==='info','border-yellow-200 dark:border-yellow-800':toast.type==='warning'}">
                <div class="shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-sm"
                    :class="{'bg-green-100 text-green-600':toast.type==='success','bg-red-100 text-red-600':toast.type==='error','bg-blue-100 text-blue-600':toast.type==='info','bg-yellow-100 text-yellow-600':toast.type==='warning'}">
                    <i :class="{'ri-check-line':toast.type==='success','ri-error-warning-line':toast.type==='error','ri-information-line':toast.type==='info','ri-alert-line':toast.type==='warning'}"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold text-gray-900 dark:text-white" x-text="toast.title"></p>
                    <p class="text-xs text-gray-500 mt-0.5" x-text="toast.message"></p>
                </div>
                <button @click="dismissToast(toast.id)" class="shrink-0 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200"><i class="ri-close-line text-sm"></i></button>
            </div>
        </template>
    </div>

    <!-- Sidebar Layout -->
    <div x-show="sidebarOpen" x-transition:enter="transition-opacity ease-linear duration-300"
        x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
        x-transition:leave="transition-opacity ease-linear duration-300" x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0" @click="sidebarOpen = false"
        class="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 lg:hidden" aria-hidden="true" x-cloak>
    </div>

    <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
        class="fixed inset-y-0 left-0 z-50 w-64 bg-white/70 dark:bg-gray-900/80 backdrop-blur-xl border-r border-gray-200/50 dark:border-gray-800/50 shadow-[4px_0_24px_rgba(0,0,0,0.02)] transform transition-transform duration-300 ease-in-out lg:static lg:translate-x-0 flex flex-col h-full">

        <div class="h-16 flex items-center justify-between px-6 border-b border-gray-100/50 dark:border-gray-800/50">
            <a href="../index.html" class="flex items-center gap-2.5 group">
                <div
                    class="w-8 h-8 rounded-xl bg-black dark:bg-white text-white dark:text-black flex items-center justify-center shadow-lg shadow-gray-200/50 dark:shadow-none group-hover:scale-105 transition-transform">
                    <i class="lni lni-graduation"></i>
                </div>
                <span
                    class="font-display font-bold text-xl text-black dark:text-white tracking-tight">AcademicSync</span>
            </a>
            <button @click="sidebarOpen = false" aria-label="Close Sidebar"
                class="lg:hidden text-gray-400 hover:text-black transition-colors">
                <i class="lni lni-close text-xl"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto py-6 px-3 space-y-1 custom-scrollbar">
            <p class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Main Menu</p>

            <a href="admin-dashboard.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white hover:backdrop-blur-sm">
                <i
                    class="lni lni-grid-alt text-lg text-gray-400 dark:text-gray-500 group-hover:text-black dark:group-hover:text-white"></i>
                Dashboard
            </a>

            <a href="manage-users.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white hover:backdrop-blur-sm">
                <i
                    class="lni lni-users text-lg text-gray-400 dark:text-gray-500 group-hover:text-black dark:group-hover:text-white"></i>
                Manage Users
            </a>

            <a href="admin-courses.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white hover:backdrop-blur-sm">
                <i
                    class="lni lni-book text-lg text-gray-400 dark:text-gray-500 group-hover:text-black dark:group-hover:text-white"></i>
                Courses
            </a>

            <a href="departments.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group bg-white/60 dark:bg-white/10 text-black dark:text-white shadow-sm border border-white/40 dark:border-white/5 backdrop-blur-sm"
                aria-current="page">
                <i class="lni lni-apartment text-lg text-black dark:text-white"></i>
                Departments
            </a>
            <a href="admin-analytics.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white hover:backdrop-blur-sm">
                <i class="lni lni-bar-chart text-lg text-gray-400 dark:text-gray-500 group-hover:text-black dark:group-hover:text-white"></i> Analytics
            </a>
            <p class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider mt-4 mb-2">System</p>
            <a href="system-settings.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white hover:backdrop-blur-sm">
                <i
                    class="lni lni-cog text-lg text-gray-400 dark:text-gray-500 group-hover:text-black dark:group-hover:text-white"></i>
                System Settings
            </a>

            <a href="post-announcement.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white hover:backdrop-blur-sm">
                <i class="lni lni-bullhorn text-lg text-gray-400 dark:text-gray-500 group-hover:text-black dark:group-hover:text-white"></i>
                Announcements
            </a>

            <a href="admin-settings.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white hover:backdrop-blur-sm">
                <i class="lni lni-cog-2 text-lg text-gray-400 dark:text-gray-500 group-hover:text-black dark:group-hover:text-white"></i>
                Account Settings
            </a>

            <a href="admin-profile.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white hover:backdrop-blur-sm">
                <i class="lni lni-user text-lg text-gray-400 dark:text-gray-500 group-hover:text-black dark:group-hover:text-white"></i>
                Profile
            </a>
        </div>

        <div class="p-4 border-t border-gray-100/50 dark:border-gray-800/50">
            <button @click="darkMode = !darkMode"
                class="w-full flex items-center justify-center gap-2 mb-3 py-2 rounded-lg bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors text-xs font-bold uppercase tracking-wider">
                <i class="lni lni-sun" x-show="!darkMode"></i>
                <i class="lni lni-night" x-show="darkMode" style="display:none"></i>
                <span x-text="darkMode ? 'Light Mode' : 'Dark Mode'"></span>
            </button>
            <a href="admin-profile.html" class="flex items-center gap-3 p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                <div class="w-9 h-9 rounded-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center font-bold text-xs uppercase shrink-0" x-text="userInitials"></div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold text-black dark:text-white truncate" x-text="userName"></p>
                    <p class="text-xs text-gray-400">System Administrator</p>
                </div>
            </a>
            <button @click="handleLogout()"
                class="mt-2 w-full flex items-center justify-center gap-2 text-xs font-bold text-gray-400 hover:text-black dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800 py-2 rounded-lg transition-all uppercase tracking-wider">
                <i class="lni lni-exit"></i> Sign Out
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 relative">
        <!-- Mobile Header -->
        <div
            class="lg:hidden h-14 border-b border-gray-100/50 dark:border-gray-800/50 flex items-center justify-between px-4 sticky top-0 bg-white/70 dark:bg-gray-900/80 backdrop-blur-xl z-20 shadow-[0_4px_24px_rgba(0,0,0,0.02)]">
            <div class="flex items-center gap-2">
                <div
                    class="w-8 h-8 bg-black dark:bg-white rounded-lg flex items-center justify-center text-white dark:text-black font-bold text-sm shadow-sm">
                    AS</div>
                <span class="font-semibold text-black dark:text-white">AcademicSync</span>
            </div>
            <button @click="sidebarOpen = !sidebarOpen"
                class="p-2 -mr-2 text-gray-500 hover:text-black dark:hover:text-white hover:bg-gray-50 dark:hover:bg-gray-800 rounded-md">
                <i class="ri-menu-line text-xl"></i>
            </button>
        </div>

        <!-- Content Scroller -->
        <main class="flex-1 overflow-y-auto scroll-smooth p-4 sm:p-6 lg:p-8">
            <!-- Error boundary -->
            <div x-show="initError" x-cloak class="mb-6 p-4 rounded-xl border border-red-200 dark:border-red-800/50 bg-red-50 dark:bg-red-900/20 flex items-start gap-3">
                <i class="lni lni-warning text-red-500 mt-0.5 shrink-0 text-lg"></i>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold text-red-700 dark:text-red-300" x-text="initError"></p>
                    <button @click="initError = ''; init()" class="mt-1.5 text-xs font-bold text-red-600 dark:text-red-400 hover:underline">Try again</button>
                </div>
                <button @click="initError = ''" aria-label="Dismiss error" class="text-red-300 hover:text-red-500 shrink-0"><i class="lni lni-close text-xs"></i></button>
            </div>
            <div class="animate-fade-in-up space-y-8 pb-12">
                <!-- Header -->
                <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
                    <div>
                        <h1 class="text-3xl font-display font-bold text-black dark:text-white tracking-tight">
                            Departments</h1>
                        <p class="text-gray-500 mt-2">Manage academic divisions and departments.</p>
                    </div>
                    <div class="flex flex-wrap items-center gap-3">
                        <button
                            class="flex items-center gap-2 px-5 py-2.5 bg-black dark:bg-white text-white dark:text-black rounded-xl text-sm font-bold hover:bg-gray-800 dark:hover:bg-gray-200 transition-all shadow-lg hover:-translate-y-0.5">
                            <i class="lni lni-plus"></i>
                            <span>Add Department</span>
                        </button>
                    </div>
                </div>

                <!-- Departments Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                    <!-- Skeleton cards while loading -->
                    <template x-if="isLoading">
                        <template x-for="i in 4" :key="i">
                            <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl p-6 shadow-sm">
                                <div class="flex justify-between items-start mb-4">
                                    <div class="skeleton w-12 h-12 rounded-xl"></div>
                                </div>
                                <div class="skeleton h-5 w-40 rounded mb-2"></div>
                                <div class="skeleton h-3 w-full rounded mb-1"></div>
                                <div class="skeleton h-3 w-3/4 rounded mb-6"></div>
                                <div class="flex items-center justify-between pt-4 border-t border-gray-100 dark:border-gray-700">
                                    <div class="skeleton h-3 w-16 rounded"></div>
                                    <div class="skeleton h-3 w-20 rounded"></div>
                                </div>
                            </div>
                        </template>
                    </template>

                    <!-- No departments message -->
                    <template x-if="!isLoading && departments.length === 0">
                        <div class="col-span-full text-center py-16 text-gray-400">
                            <i class="lni lni-apartment text-4xl block mb-2"></i>
                            <p class="text-sm">No departments found.</p>
                        </div>
                    </template>

                    <!-- Department cards from API -->
                    <template x-if="!isLoading">
                        <template x-for="(dept, index) in departments" :key="dept.id || index">
                            <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl p-6 shadow-sm hover:shadow-lg transition-all group">
                                <div class="flex justify-between items-start mb-4">
                                    <div class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl group-hover:scale-110 transition-transform"
                                        :class="['bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400','bg-orange-100 text-orange-600 dark:bg-orange-900/30 dark:text-orange-400','bg-purple-100 text-purple-600 dark:bg-purple-900/30 dark:text-purple-400','bg-green-100 text-green-600 dark:bg-green-900/30 dark:text-green-400','bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400','bg-indigo-100 text-indigo-600 dark:bg-indigo-900/30 dark:text-indigo-400'][index % 6]">
                                        <i :class="['lni lni-code','lni lni-calculator','lni lni-bulb','lni lni-book','lni lni-leaf','lni lni-graduation'][index % 6]"></i>
                                    </div>
                                </div>
                                <h3 class="text-xl font-bold text-black dark:text-white mb-2" x-text="dept.name || dept.department_name || 'Department'"></h3>
                                <p class="text-sm text-gray-500 dark:text-gray-400 mb-6" x-text="dept.description || dept.code || '--'"></p>
                                <div class="flex items-center justify-between pt-4 border-t border-gray-100 dark:border-gray-700">
                                    <span class="text-xs font-mono text-gray-400" x-text="dept.code || ''"></span>
                                    <span class="text-sm font-semibold text-gray-500" x-text="(dept.faculty_count || 0) + ' Faculty'"></span>
                                </div>
                            </div>
                        </template>
                    </template>

                    <!-- Add New Department button -->
                    <button @click="addToast('Coming Soon', 'Department creation will be available soon.', 'info')"
                        class="bg-gray-50 dark:bg-gray-900/50 border-2 border-dashed border-gray-200 dark:border-gray-700 rounded-2xl p-6 flex flex-col items-center justify-center text-gray-400 hover:text-black dark:hover:text-white hover:border-black dark:hover:border-white transition-all group h-full min-h-[200px]">
                        <div class="w-12 h-12 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                            <i class="lni lni-plus"></i>
                        </div>
                        <span class="font-bold">Add New Department</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
    function deptPage() {
        return {
            sidebarOpen: false,
            darkMode: localStorage.getItem('darkMode') === 'true',
            isLoading: true,
            initError: '',
            toasts: [], _toastId: 0,
            userName: 'Loading...', userInitials: '?',
            departments: [],

            async init() {
                this.$watch('darkMode', v => { localStorage.setItem('darkMode', v); document.documentElement.classList.toggle('dark', v); });
                document.documentElement.classList.toggle('dark', this.darkMode);
                this.$watch('sidebarOpen', v => { document.body.style.overflow = v ? 'hidden' : ''; });

                const api = window.api || new AcademicSyncAPI(window._apiBase || 'http://localhost:5000');
                this._api = api;
                if (!api.checkAuth()) { window.location.href = 'admin-login.html'; return; }
                const user = api.getUserData();
                if (user && user.role !== 'admin') { api.clearToken(); window.location.href = 'admin-login.html'; return; }
                if (user) {
                    const name = user.full_name || user.user_id || 'Administrator';
                    this.userName = name;
                    this.userInitials = name.split(' ').filter(Boolean).map(w => w[0]).join('').toUpperCase().slice(0,2) || '?';
                }
                await this.fetchDepartments();
            },

            async fetchDepartments() {
                this.isLoading = true;
                try {
                    const data = await this._api.getAdminDepartments();
                    this.departments = Array.isArray(data) ? data : (data.departments || []);
                } catch (e) {
                    this.addToast('Error', 'Failed to load departments.', 'error');
                    this.initError = 'Failed to load departments. Please try again.';
                } finally {
                    this.isLoading = false;
                }
            },

            handleLogout() {
                this.addToast('Signing out', 'See you next time!', 'info');
                setTimeout(async () => { try { await this._api.logout(); } catch(_){} window.location.href = 'admin-login.html'; }, 800);
            },

            addToast(title, message, type = 'info') {
                const id = ++this._toastId;
                this.toasts.push({ id, title, message, type, visible: false });
                setTimeout(() => { const t = this.toasts.find(x => x.id===id); if(t) t.visible = true; }, 50);
                setTimeout(() => this.dismissToast(id), 5000);
            },

            dismissToast(id) {
                const t = this.toasts.find(x => x.id===id);
                if (t) { t.visible = false; setTimeout(() => { this.toasts = this.toasts.filter(x => x.id!==id); }, 300); }
            },
        };
    }
    </script>
</body>
</html>
