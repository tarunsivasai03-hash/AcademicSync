    <script>
        // Initialize API client
        const api = new AcademicSyncAPI(window._apiBase || 'http://localhost:5000');

        // Store all courses for re-filtering
        let allCourses = [];

        const DEPT_COLORS = [
            { bg: 'bg-indigo-100 dark:bg-indigo-900/30', text: 'text-indigo-600 dark:text-indigo-400', border: 'border-indigo-200 dark:border-indigo-700' },
            { bg: 'bg-emerald-100 dark:bg-emerald-900/30', text: 'text-emerald-600 dark:text-emerald-400', border: 'border-emerald-200 dark:border-emerald-700' },
            { bg: 'bg-purple-100 dark:bg-purple-900/30',  text: 'text-purple-600 dark:text-purple-400',  border: 'border-purple-200 dark:border-purple-700' },
            { bg: 'bg-orange-100 dark:bg-orange-900/30',  text: 'text-orange-600 dark:text-orange-400',  border: 'border-orange-200 dark:border-orange-700' },
            { bg: 'bg-pink-100 dark:bg-pink-900/30',      text: 'text-pink-600 dark:text-pink-400',      border: 'border-pink-200 dark:border-pink-700' },
            { bg: 'bg-blue-100 dark:bg-blue-900/30',      text: 'text-blue-600 dark:text-blue-400',      border: 'border-blue-200 dark:border-blue-700' },
        ];

        document.addEventListener('DOMContentLoaded', async function() {
            if (!api.checkAuth()) { window.location.href = 'student-login.html'; return; }
            const _cu = api.getUserData();
            if (_cu && _cu.role !== 'student') { api.clearToken(); window.location.href = 'student-login.html'; return; }
            if (_cu) api.populateSidebar(_cu);
            await loadCourses();
        });

        async function loadCourses() {
            try {
                const courses = await api.getCourses();
                allCourses = courses;
                setupFilters();
                displayCourses(courses);
            } catch (error) {
                console.error('Error loading courses:', error);
                const grid = document.querySelector('[data-enrolled-courses]');
                if (grid) grid.innerHTML = '<div class="col-span-full text-center py-12 text-red-500">Failed to load courses. Please refresh.</div>';
                api.showNotification('Failed to load courses', 'error');
            }
        }

        function setupFilters() {
            const searchEl = document.getElementById('course-search');
            const semesterEl = document.getElementById('semester-filter');
            const deptEl = document.getElementById('dept-filter');
            const applyFilter = () => {
                const q = (searchEl?.value || '').toLowerCase().trim();
                const sem = semesterEl?.value || '';
                const dept = deptEl?.value || '';
                const filtered = allCourses.filter(c => {
                    const name = (c.course_name || '').toLowerCase();
                    const code = (c.course_code || '').toLowerCase();
                    const faculty = (c.faculty_name || '').toLowerCase();
                    const department = (c.department || '').toLowerCase();
                    const semester = (c.semester || '');
                    if (q && !name.includes(q) && !code.includes(q) && !faculty.includes(q)) return false;
                    if (sem && !semester.includes(sem)) return false;
                    if (dept && !department.toLowerCase().includes(dept.toLowerCase())) return false;
                    return true;
                });
                displayCourses(filtered);
            };
            searchEl?.addEventListener('input', applyFilter);
            semesterEl?.addEventListener('change', applyFilter);
            deptEl?.addEventListener('change', applyFilter);
        }

        function displayCourses(courses) {
            const grid    = document.querySelector('[data-enrolled-courses]');
            const summary = document.querySelector('[data-course-summary]');
            if (!grid) return;

            if (summary) summary.textContent = courses.length
                ? `${courses.length} course${courses.length !== 1 ? 's' : ''} enrolled this semester`
                : 'No courses enrolled yet';

            if (!courses.length) {
                grid.innerHTML = '<div class="col-span-full text-center py-12 text-gray-400 dark:text-gray-500"><i class="lni lni-library text-4xl block mb-3"></i><p class="font-medium">No enrolled courses yet.</p><p class="text-sm mt-1">Contact your academic advisor to enroll in courses.</p></div>';
                return;
            }

            grid.innerHTML = courses.map((course, idx) => {
                const col   = DEPT_COLORS[idx % DEPT_COLORS.length];
                const abbr  = (course.course_code || 'CR').substring(0, 2).toUpperCase();
                const grade = course.grade ? `<span class="ml-auto px-2.5 py-1 rounded-full text-xs font-bold bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 border border-gray-200 dark:border-gray-600">Grade: ${course.grade}</span>` : '';
                return `
                <div class="group bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm hover:shadow-lg transition-all duration-300 overflow-hidden">
                    <div class="p-6">
                        <div class="flex items-start justify-between mb-4">
                            <div class="w-12 h-12 rounded-xl ${col.bg} ${col.text} flex items-center justify-center text-lg font-bold border ${col.border}">
                                ${abbr}
                            </div>
                            <div class="flex items-center gap-2">
                                ${grade}
                                <span class="px-2.5 py-1 rounded-full text-xs font-bold bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 border border-blue-200 dark:border-blue-700">
                                    ${course.credits || '--'} Credits
                                </span>
                            </div>
                        </div>
                        <h3 class="text-lg font-bold text-black dark:text-white mb-1">${course.course_name || 'Unnamed Course'}</h3>
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">${course.course_code || ''}</p>
                        ${course.description ? `<p class="text-sm text-gray-500 dark:text-gray-400 mb-4 line-clamp-2">${course.description}</p>` : ''}
                        <div class="flex items-center gap-2 text-sm text-gray-500 dark:text-gray-400">
                            <i class="lni lni-user"></i>
                            <span>${course.faculty_name || 'TBA'}</span>
                        </div>
                    </div>
                    <div class="px-6 py-4 bg-gray-50 dark:bg-gray-900/50 border-t border-gray-100 dark:border-gray-700 flex gap-2">
                        <a href="course-detail.html?id=${course.id}" class="flex-1 text-center py-2.5 bg-black dark:bg-white text-white dark:text-black rounded-xl text-sm font-bold hover:bg-gray-800 dark:hover:bg-gray-200 transition-colors">
                            View Details
                        </a>
                        <button data-drop-id="${course.id}" onclick="dropCourse(${course.id})" class="px-4 py-2.5 rounded-xl border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 text-sm font-bold hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                            Drop
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        const droppingCourses = new Set();
        async function dropCourse(courseId) {
            if (droppingCourses.has(courseId)) return;
            if (!confirm('Are you sure you want to drop this course?')) return;
            droppingCourses.add(courseId);
            const btn = document.querySelector(`[data-drop-id="${courseId}"]`);
            if (btn) { btn.disabled = true; btn.textContent = 'Dropping...'; }
            try {
                await api.dropCourse(courseId);
                api.showNotification('Successfully dropped course', 'success');
                await loadCourses();
            } catch (error) {
                api.showNotification(error.message || 'Failed to drop course', 'error');
                droppingCourses.delete(courseId);
                if (btn) { btn.disabled = false; btn.textContent = 'Drop'; }
            }
        }

        async function logout() {
            try { await api.logout(); } catch (_) {}
            window.location.href = 'student-login.html';
        }
    </script>
</body>
</html>
