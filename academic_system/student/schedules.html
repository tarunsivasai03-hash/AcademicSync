    <script>
        const COLORS = ['bg-indigo-500','bg-emerald-500','bg-violet-500','bg-rose-500','bg-amber-500','bg-cyan-500','bg-blue-600','bg-fuchsia-500'];
        let _colorIdx = 0;
        function nextColor() { return COLORS[_colorIdx++ % COLORS.length]; }
        // Note: adding classes is a faculty-only action; students view their enrolled schedule.

        function normalizeSession(s) {
            return {
                id: s.id,
                name: s.course_name || s.course_code || 'Class',
                day: s.day_of_week || 'Monday',
                start: (s.start_time || '09:00').slice(0, 5),
                end:   (s.end_time   || '10:00').slice(0, 5),
                room:      s.room        || '',
                professor: s.faculty_name || '',
                colorClass: nextColor(),
                fromApi: true
            };
        }

        function scheduleApp() {
            return {
                sidebarOpen: false,
                loading: true,
                refreshing: false,
                darkMode: localStorage.getItem('darkMode') === 'true',
                days: ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'],
                classes: [],

                async init() {
                    const apiClient = new AcademicSyncAPI(window._apiBase || 'http://localhost:5000');
                    if (!apiClient.checkAuth()) { window.location.href = 'student-login.html'; return; }
                    this._api = apiClient;

                    if (this.darkMode) document.documentElement.classList.add('dark');
                    this.$watch('darkMode', val => {
                        localStorage.setItem('darkMode', val);
                        if (val) document.documentElement.classList.add('dark');
                        else document.documentElement.classList.remove('dark');
                    });

                    // User info
                    const user = apiClient.getUserData();
                    if (user) apiClient.populateSidebar(user);

                    // Load schedule from API
                    try {
                        const sessions = await apiClient.getSchedule();
                        this.classes = sessions.map(normalizeSession);
                    } catch (e) {
                        console.warn('Schedule load error:', e);
                        // fall back to any locally saved classes
                        this.classes = JSON.parse(localStorage.getItem('academicSync_classes') || '[]');
                    }
                    this.loading = false;
                },

                logout() {
                    this._api?.logout().catch(() => {});
                    window.location.href = 'student-login.html';
                },

                async refreshSchedule() {
                    if (this.refreshing) return;
                    this.refreshing = true;
                    _colorIdx = 0;
                    try {
                        const sessions = await this._api.getSchedule();
                        this.classes = sessions.map(normalizeSession);
                        this._api?.showNotification('Schedule updated', 'success');
                    } catch (e) {
                        this._api?.showNotification('Could not refresh schedule', 'error');
                    }
                    this.refreshing = false;
                },

                toggleDarkMode() { this.darkMode = !this.darkMode; },

                getClassesForDay(day) {
                    return this.classes.filter(c => c.day === day).sort((a, b) => a.start.localeCompare(b.start));
                }
            }
        }
    </script>
