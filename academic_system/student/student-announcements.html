<!DOCTYPE html>
<html lang="en" class="h-full bg-white antialiased">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <title>Announcements - AcademicSync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://cdn.lineicons.com/4.0/lineicons.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter','sans-serif'], display: ['Inter','sans-serif'] },
                    animation: { 'fade-in-up': 'fadeInUp 0.5s ease-out forwards' },
                    keyframes: { fadeInUp: { '0%': { opacity:'0', transform:'translateY(10px)' }, '100%': { opacity:'1', transform:'translateY(0)' } } }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/components/scrollbar.css">
    <script src="../assets/js/api.js?v=2"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .skeleton { background: linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; }
        .dark .skeleton { background: linear-gradient(90deg,#374151 25%,#4b5563 50%,#374151 75%); background-size:200% 100%; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
        .line-clamp-3 { display:-webkit-box;-webkit-line-clamp:3;line-clamp:3;-webkit-box-orient:vertical;overflow:hidden; }
        .custom-scrollbar::-webkit-scrollbar { width:6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background:transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color:#e5e7eb; border-radius:20px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color:#374151; }
    </style>
</head>

<body class="h-full flex overflow-hidden text-gray-600 font-sans antialiased bg-gradient-to-br from-gray-50 via-white to-gray-100 dark:from-gray-900 dark:via-gray-900 dark:to-gray-800 dark:text-gray-300 transition-colors duration-200"
    x-data="annPage()" x-init="init()" :class="darkMode ? 'dark' : ''" x-cloak>

    <!-- Sidebar Overlay -->
    <div x-show="sidebarOpen" @click="sidebarOpen = false"
        x-transition:enter="transition-opacity ease-linear duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
        x-transition:leave="transition-opacity ease-linear duration-300" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
        class="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 lg:hidden" x-cloak></div>

    <!-- Sidebar -->
    <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
        class="fixed inset-y-0 left-0 z-50 w-64 bg-white/70 dark:bg-gray-900/80 backdrop-blur-xl border-r border-gray-200/50 dark:border-gray-800/50 shadow-[4px_0_24px_rgba(0,0,0,0.02)] transform transition-transform duration-300 ease-in-out lg:static lg:translate-x-0 flex flex-col h-full">

        <div class="h-16 flex items-center justify-between px-6 border-b border-gray-100/50 dark:border-gray-800/50">
            <a href="../index.html" class="flex items-center gap-2.5 group">
                <div class="w-8 h-8 rounded-xl bg-black dark:bg-white text-white dark:text-black flex items-center justify-center shadow-lg group-hover:scale-105 transition-transform">
                    <i class="lni lni-graduation"></i>
                </div>
                <span class="font-display font-bold text-xl text-black dark:text-white tracking-tight">AcademicSync</span>
            </a>
            <button @click="sidebarOpen = false" class="lg:hidden text-gray-400 hover:text-black transition-colors"><i class="lni lni-close text-xl"></i></button>
        </div>

        <div class="flex-1 overflow-y-auto py-6 px-3 space-y-1 custom-scrollbar">
            <p class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Menu</p>

            <a href="student-dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white">
                <i class="lni lni-grid-alt text-lg group-hover:text-black dark:group-hover:text-white"></i> Dashboard
            </a>
            <a href="schedules.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white">
                <i class="lni lni-calendar text-lg group-hover:text-black dark:group-hover:text-white"></i> Schedule
            </a>
            <a href="tasks.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white">
                <i class="lni lni-list text-lg group-hover:text-black dark:group-hover:text-white"></i> Tasks
            </a>
            <a href="courses.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white">
                <i class="lni lni-graduation text-lg group-hover:text-black dark:group-hover:text-white"></i> Courses
            </a>
            <a href="student-attendance.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white">
                <i class="lni lni-checkmark-circle text-lg group-hover:text-black dark:group-hover:text-white"></i> Attendance
            </a>
            <a href="student-grades.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white">
                <i class="lni lni-stats-up text-lg group-hover:text-black dark:group-hover:text-white"></i> Grades
            </a>
            <a href="student-assignments.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white">
                <i class="lni lni-files text-lg group-hover:text-black dark:group-hover:text-white"></i> Assignments
            </a>
            <!-- Active: Announcements -->
            <a href="student-announcements.html" aria-current="page"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all group bg-white/60 dark:bg-white/10 text-black dark:text-white shadow-sm border border-white/40 dark:border-white/5 backdrop-blur-sm">
                <i class="lni lni-bullhorn text-lg text-black dark:text-white"></i>
                <span>Announcements</span>
                <span x-show="unreadCount > 0" x-text="unreadCount > 99 ? '99+' : unreadCount"
                    class="ml-auto min-w-[18px] h-[18px] px-1 rounded-full bg-red-500 text-white text-[10px] font-bold flex items-center justify-center"></span>
            </a>
            <a href="resources.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white">
                <i class="lni lni-library text-lg group-hover:text-black dark:group-hover:text-white"></i> Resources
            </a>
            <a href="student-profile.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white">
                <i class="lni lni-user text-lg group-hover:text-black dark:group-hover:text-white"></i> Profile
            </a>
        </div>

        <div class="p-4 border-t border-gray-100/50 dark:border-gray-800/50 bg-white/40 dark:bg-gray-900/40 backdrop-blur-md">
            <button @click="darkMode = !darkMode" aria-label="Toggle Dark Mode"
                class="w-full flex items-center justify-center gap-2 mb-3 py-2 rounded-lg bg-white/50 dark:bg-gray-800/50 border border-white/20 dark:border-gray-700/30 text-gray-600 dark:text-gray-300 hover:bg-white/70 dark:hover:bg-gray-800/80 transition-colors shadow-sm">
                <i class="lni" :class="darkMode ? 'lni-night' : 'lni-sun'"></i>
                <span class="text-xs font-bold uppercase tracking-wider" x-text="darkMode ? 'Dark Mode' : 'Light Mode'"></span>
            </button>
            <a href="student-profile.html" class="flex items-center gap-3 p-2 rounded-xl hover:bg-white/50 dark:hover:bg-gray-800/50 transition-colors group">
                <div class="w-9 h-9 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-400 font-bold text-xs uppercase border border-gray-200 dark:border-gray-700 shadow-sm group-hover:bg-white dark:group-hover:bg-gray-700 group-hover:shadow-md transition-all">
                    <span data-user-initials>AT</span>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold text-black dark:text-white truncate" data-user-name>Alex Thompson</p>
                    <p class="text-xs text-gray-500 truncate" data-user-role>CS Student - Year 3</p>
                </div>
                <i class="lni lni-cog text-gray-400 group-hover:text-black dark:group-hover:text-white transition-colors"></i>
            </a>
            <button @click="logout()" class="mt-2 w-full flex items-center justify-center gap-2 text-xs font-bold text-gray-400 hover:text-red-600 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 py-2 rounded-lg transition-all uppercase tracking-tighter">
                <i class="lni lni-exit"></i> Sign Out
            </button>
        </div>
    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col min-w-0">
        <!-- Mobile header -->
        <div class="lg:hidden h-14 border-b border-gray-100/50 dark:border-gray-800/50 flex items-center justify-between px-4 sticky top-0 bg-white/70 dark:bg-gray-900/80 backdrop-blur-xl z-20">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-black dark:bg-white rounded-lg flex items-center justify-center text-white dark:text-black font-bold text-sm">AS</div>
                <span class="font-semibold text-black dark:text-white">AcademicSync</span>
            </div>
            <button @click="sidebarOpen = !sidebarOpen" class="p-2 -mr-2 text-gray-500 hover:text-black dark:hover:text-white hover:bg-gray-50 dark:hover:bg-gray-800 rounded-md">
                <i class="ri-menu-line text-xl"></i>
            </button>
        </div>

        <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 custom-scrollbar">
            <div class="max-w-3xl mx-auto space-y-6 pb-12 animate-fade-in-up">

                <!-- Page header -->
                <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4">
                    <div>
                        <h1 class="text-3xl font-display font-bold text-black dark:text-white tracking-tight">Announcements</h1>
                        <p class="text-gray-500 mt-1 text-sm">Messages from your admin and faculty.</p>
                    </div>
                    <button x-show="unreadCount > 0" @click="markAllRead()"
                        :disabled="markingAll"
                        class="shrink-0 flex items-center gap-2 px-4 py-2 rounded-xl border border-gray-200 dark:border-gray-600 text-sm font-semibold text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors disabled:opacity-50">
                        <i x-show="markingAll" class="ri-loader-4-line animate-spin"></i>
                        <i x-show="!markingAll" class="ri-check-double-line"></i>
                        <span x-text="markingAll ? 'Marking...' : 'Mark all as read'"></span>
                    </button>
                </div>

                <!-- Stats row -->
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-4 text-center shadow-sm">
                        <p class="text-2xl font-bold text-black dark:text-white" x-text="loading ? '—' : announcements.length"></p>
                        <p class="text-xs text-gray-500 mt-0.5 font-medium">Total</p>
                    </div>
                    <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-4 text-center shadow-sm">
                        <p class="text-2xl font-bold text-red-500" x-text="loading ? '—' : unreadCount"></p>
                        <p class="text-xs text-gray-500 mt-0.5 font-medium">Unread</p>
                    </div>
                    <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-4 text-center shadow-sm">
                        <p class="text-2xl font-bold text-orange-500" x-text="loading ? '—' : announcements.filter(a=>a.isUrgent).length"></p>
                        <p class="text-xs text-gray-500 mt-0.5 font-medium">Urgent</p>
                    </div>
                </div>

                <!-- Search + filters -->
                <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm p-4 space-y-3">
                    <div class="relative">
                        <i class="ri-search-line absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="text" x-model="search" placeholder="Search announcements…"
                            class="w-full pl-9 pr-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-black dark:text-white placeholder-gray-400 text-sm focus:outline-none focus:ring-2 focus:ring-black/10 dark:focus:ring-white/10 focus:border-black dark:focus:border-white transition-all">
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <template x-for="tab in tabs" :key="tab.value">
                            <button @click="activeTab = tab.value"
                                class="px-3 py-1.5 rounded-lg text-xs font-semibold transition-all flex items-center gap-1"
                                :class="activeTab === tab.value
                                    ? 'bg-black dark:bg-white text-white dark:text-black shadow-sm'
                                    : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600'">
                                <i :class="tab.icon"></i>
                                <span x-text="tab.label"></span>
                                <span x-show="tab.count > 0" x-text="tab.count"
                                    class="ml-0.5 bg-white/20 dark:bg-black/20 rounded-full px-1"></span>
                            </button>
                        </template>
                    </div>
                </div>

                <!-- Announcement list -->
                <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm overflow-hidden">

                    <!-- Skeleton loading -->
                    <template x-if="loading">
                        <div class="divide-y divide-gray-100 dark:divide-gray-700">
                            <template x-for="i in 5" :key="i">
                                <div class="flex items-start gap-4 p-5">
                                    <div class="skeleton w-10 h-10 rounded-xl shrink-0"></div>
                                    <div class="flex-1 space-y-2">
                                        <div class="flex gap-2">
                                            <div class="skeleton h-4 w-20 rounded-full"></div>
                                            <div class="skeleton h-4 w-16 rounded-full"></div>
                                        </div>
                                        <div class="skeleton h-4 w-3/4 rounded"></div>
                                        <div class="skeleton h-3 w-full rounded"></div>
                                        <div class="skeleton h-3 w-2/3 rounded"></div>
                                        <div class="skeleton h-2.5 w-24 rounded mt-2"></div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- Empty state -->
                    <template x-if="!loading && filtered.length === 0">
                        <div class="text-center py-20 px-6">
                            <div class="w-14 h-14 mx-auto mb-4 rounded-2xl bg-gray-100 dark:bg-gray-700 flex items-center justify-center">
                                <i class="lni lni-bullhorn text-2xl text-gray-400"></i>
                            </div>
                            <p class="font-semibold text-gray-700 dark:text-gray-300 mb-1"
                                x-text="search ? 'No results found' : 'No announcements here'"></p>
                            <p class="text-sm text-gray-400"
                                x-text="search ? 'Try a different search term.' : 'Check back later for new messages.'"></p>
                        </div>
                    </template>

                    <!-- Announcement cards -->
                    <template x-if="!loading">
                        <div class="divide-y divide-gray-100 dark:divide-gray-700">
                            <template x-for="ann in filtered" :key="ann.id">
                                <div @click="markRead(ann)"
                                    class="flex items-start gap-4 p-5 group transition-colors cursor-pointer"
                                    :class="!ann.is_read ? 'bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700/40' : 'bg-white dark:bg-gray-800 opacity-70 hover:bg-gray-50 dark:hover:bg-gray-700/30 hover:opacity-100'">

                                    <!-- Icon -->
                                    <div class="w-11 h-11 rounded-xl flex items-center justify-center shrink-0 transition-transform group-hover:scale-105"
                                        :class="ann.isUrgent
                                            ? 'bg-red-100 dark:bg-red-900/30'
                                            : ann.isFaculty
                                            ? 'bg-purple-100 dark:bg-purple-900/20'
                                            : 'bg-blue-100 dark:bg-blue-900/20'">
                                        <i class="lni lni-bullhorn text-base"
                                            :class="ann.isUrgent
                                                ? 'text-red-600 dark:text-red-400'
                                                : ann.isFaculty
                                                ? 'text-purple-600 dark:text-purple-400'
                                                : 'text-blue-600 dark:text-blue-400'"></i>
                                    </div>

                                    <!-- Body -->
                                    <div class="flex-1 min-w-0">
                                        <!-- Badges row -->
                                        <div class="flex flex-wrap items-center gap-1.5 mb-2">
                                            <!-- Urgent -->
                                            <span x-show="ann.isUrgent"
                                                class="inline-flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-full bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400 border border-red-200 dark:border-red-800">
                                                <i class="ri-alarm-warning-line"></i> URGENT
                                            </span>
                                            <!-- Sender badge -->
                                            <span class="inline-flex items-center gap-1 text-[10px] font-semibold px-2 py-0.5 rounded-full border"
                                                :class="ann.isFaculty
                                                    ? 'bg-purple-50 dark:bg-purple-900/20 text-purple-700 dark:text-purple-400 border-purple-200 dark:border-purple-800'
                                                    : 'bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-400 border-blue-200 dark:border-blue-800'">
                                                <i :class="ann.isFaculty ? 'ri-user-star-line' : 'lni lni-apartment'"></i>
                                                <span x-text="ann.senderName"></span>
                                            </span>
                                            <!-- Course name (faculty only) -->
                                            <span x-show="ann.courseName"
                                                class="inline-flex items-center gap-1 text-[10px] font-medium px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-600">
                                                <i class="lni lni-book text-[10px]"></i>
                                                <span x-text="ann.courseName"></span>
                                            </span>
                                            <!-- Unread dot -->
                                            <span x-show="!ann.is_read" class="w-2 h-2 rounded-full bg-black dark:bg-white inline-block"></span>
                                        </div>

                                        <!-- Title -->
                                        <p class="font-bold text-black dark:text-white leading-snug" x-text="ann.cleanTitle"></p>

                                        <!-- Message -->
                                        <p class="text-sm text-gray-600 dark:text-gray-300 mt-1 line-clamp-3" x-text="ann.message"></p>

                                        <!-- Footer -->
                                        <div class="flex items-center gap-3 mt-2.5 text-xs text-gray-400">
                                            <span class="flex items-center gap-1">
                                                <i class="ri-time-line"></i>
                                                <span x-text="ann.timeStr"></span>
                                            </span>
                                            <span x-show="ann.is_read" class="flex items-center gap-1 text-green-500">
                                                <i class="ri-check-double-line"></i> Read
                                            </span>
                                            <span x-show="!ann.is_read" class="text-gray-400 italic">Click to mark as read</span>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>

            </div>
        </main>
    </div>

    <script>
    function annPage() {
        return {
            sidebarOpen: false,
            darkMode: localStorage.getItem('darkMode') === 'true',
            userName: 'Loading...', userInitials: '?',

            loading: true,
            announcements: [],  // parsed
            search: '',
            activeTab: 'all',
            markingAll: false,

            tabs: [],

            get unreadCount() {
                return this.announcements.filter(a => !a.is_read).length;
            },

            get filtered() {
                let list = this.announcements;
                if (this.activeTab === 'admin')   list = list.filter(a => !a.isFaculty);
                if (this.activeTab === 'faculty') list = list.filter(a =>  a.isFaculty);
                if (this.activeTab === 'urgent')  list = list.filter(a =>  a.isUrgent);
                if (this.activeTab === 'unread')  list = list.filter(a => !a.is_read);
                if (this.search.trim()) {
                    const q = this.search.toLowerCase();
                    list = list.filter(a =>
                        a.cleanTitle.toLowerCase().includes(q) ||
                        (a.message || '').toLowerCase().includes(q) ||
                        a.senderName.toLowerCase().includes(q) ||
                        (a.courseName || '').toLowerCase().includes(q)
                    );
                }
                return list;
            },

            buildTabs() {
                this.tabs = [
                    { value: 'all',     label: 'All',     icon: 'ri-apps-line',          count: this.announcements.length },
                    { value: 'admin',   label: 'Admin',   icon: 'lni lni-apartment',     count: this.announcements.filter(a => !a.isFaculty).length },
                    { value: 'faculty', label: 'Faculty', icon: 'ri-user-star-line',     count: this.announcements.filter(a => a.isFaculty).length },
                    { value: 'urgent',  label: 'Urgent',  icon: 'ri-alarm-warning-line', count: this.announcements.filter(a => a.isUrgent).length },
                    { value: 'unread',  label: 'Unread',  icon: 'ri-mail-unread-line',   count: this.unreadCount },
                ];
            },

            parse(n) {
                const isFaculty = n.notification_type === 'announce_faculty';
                const isUrgent  = !!(n.title && n.title.includes('[URGENT]'));
                const cleanTitle = (n.title || '')
                    .replace(/^\[Announcement\]\s*/i, '')
                    .replace(/^\[URGENT\]\s*/i, '')
                    .trim() || '(no title)';

                let senderName = isFaculty ? 'Faculty' : 'Admin';
                let courseName = '';
                if (n.related_type) {
                    if (n.related_type.startsWith('faculty:')) {
                        const parts = n.related_type.slice(8).split('|');
                        senderName = parts[0] || 'Faculty';
                        courseName = parts[1] || '';
                    } else if (n.related_type.startsWith('admin:')) {
                        senderName = n.related_type.slice(6) || 'Admin';
                    }
                }

                const timeStr = n.created_at
                    ? new Date(n.created_at).toLocaleDateString('en-US',
                        { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' })
                    : '';

                return { ...n, isFaculty, isUrgent, cleanTitle, senderName, courseName, timeStr };
            },

            async init() {
                this.$watch('darkMode', v => {
                    localStorage.setItem('darkMode', v);
                    document.documentElement.classList.toggle('dark', v);
                });
                document.documentElement.classList.toggle('dark', this.darkMode);
                this.$watch('sidebarOpen', v => { document.body.style.overflow = v ? 'hidden' : ''; });

                const api = window.api || new AcademicSyncAPI(window._apiBase || 'http://localhost:5000');
                this._api = api;
                if (!api.checkAuth()) { window.location.href = 'student-login.html'; return; }
                const user = api.getUserData();
                if (user && user.role !== 'student') { api.clearToken(); window.location.href = 'student-login.html'; return; }
                if (user) {
                    const name = user.full_name || user.user_id || 'Student';
                    this.userName = name;
                    this.userInitials = name.split(' ').filter(Boolean).map(w => w[0]).join('').toUpperCase().slice(0,2) || '?';
                }
                await this.load();

                // -- Real-time updates via SSE -----------------------------
                // The global api.js stream fires 'academicsync:notifications';
                // reload the list whenever a new announcement arrives.
                window.addEventListener('academicsync:notifications', (e) => {
                    const { unread_count, notifications = [] } = e.detail;
                    const hasNew = notifications.some(
                        n => n.notification_type?.startsWith('announce')
                    );
                    // Only reload if count went up (new items) to avoid wiping
                    // in-progress reads triggered by the same user action
                    if (hasNew && unread_count > this.unreadCount) {
                        this.load();
                    }
                });
            },

            async load() {
                this.loading = true;
                try {
                    const data = await this._api.getNotifications(false, 200);
                    const all  = Array.isArray(data) ? data : (data.notifications || []);
                    this.announcements = all
                        .filter(n => n.notification_type && n.notification_type.startsWith('announce'))
                        .map(n => this.parse(n));
                    this.buildTabs();
                } catch (e) {
                    console.warn('Announcements load error:', e);
                } finally {
                    this.loading = false;
                }
            },

            async markRead(ann) {
                if (ann.is_read) return;
                try {
                    await this._api.markNotificationRead(ann.id);
                    ann.is_read = true;
                    this.buildTabs();
                } catch (_) {}
            },

            async markAllRead() {
                this.markingAll = true;
                try {
                    // Mark each unread announcement
                    const unread = this.announcements.filter(a => !a.is_read);
                    await Promise.all(unread.map(a => this._api.markNotificationRead(a.id).catch(() => {})));
                    this.announcements.forEach(a => { a.is_read = true; });
                    this.buildTabs();
                } catch (_) {}
                finally { this.markingAll = false; }
            },

            logout() {
                setTimeout(async () => {
                    try { await this._api.logout(); } catch (_) {}
                    window.location.href = 'student-login.html';
                }, 100);
            }
        };
    }
    </script>
