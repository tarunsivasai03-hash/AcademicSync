<!DOCTYPE html>
<html lang="en" class="h-full bg-white antialiased">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <title>Attendance - AcademicSync</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://cdn.lineicons.com/4.0/lineicons.css" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Inter', 'sans-serif'] },
                    colors: { gray: { 750: '#2d3748' } },
                    animation: { 'fade-in-up': 'fadeInUp 0.5s ease-out forwards' },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <script src="../assets/js/main.js" defer></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="../assets/css/styles.css">

    <style>
        [x-cloak] { display: none !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #e5e7eb; border-radius: 20px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #374151; }
    </style>
</head>

<body class="h-full flex overflow-hidden text-gray-600 font-sans antialiased bg-gradient-to-br from-gray-50 via-white to-gray-100 dark:from-gray-900 dark:via-gray-900 dark:to-gray-800 dark:text-gray-300 transition-colors duration-200"
      x-data="layout">

    <!-- Mobile Backdrop -->
    <div x-show="sidebarOpen" @click="sidebarOpen = false"
        class="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 lg:hidden" x-cloak></div>

    <!-- Sidebar -->
    <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
        class="fixed inset-y-0 left-0 z-50 w-64 bg-white/70 dark:bg-gray-900/80 backdrop-blur-xl border-r border-gray-200/50 dark:border-gray-800/50 shadow-[4px_0_24px_rgba(0,0,0,0.02)] transform transition-transform duration-300 ease-in-out lg:static lg:translate-x-0 flex flex-col h-full">

        <div class="h-16 flex items-center justify-between px-6 border-b border-gray-100/50 dark:border-gray-800/50">
            <a href="../index.html" class="flex items-center gap-2.5 group">
                <div class="w-8 h-8 rounded-xl bg-black dark:bg-white text-white dark:text-black flex items-center justify-center shadow-lg">
                    <i class="lni lni-graduation"></i>
                </div>
                <span class="font-display font-bold text-xl text-black dark:text-white tracking-tight">AcademicSync</span>
            </a>
            <button @click="sidebarOpen = false" class="lg:hidden text-gray-400 hover:text-black transition-colors">
                <i class="lni lni-close text-xl"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto py-6 px-3 space-y-1 custom-scrollbar">
            <p class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Menu</p>

            <a href="student-dashboard.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white hover:backdrop-blur-sm">
                <i class="lni lni-grid-alt text-lg group-hover:text-black dark:group-hover:text-white"></i>
                Dashboard
            </a>

            <a href="schedules.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white hover:backdrop-blur-sm">
                <i class="lni lni-calendar text-lg group-hover:text-black dark:group-hover:text-white"></i>
                Schedule
            </a>

            <a href="tasks.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white hover:backdrop-blur-sm">
                <i class="lni lni-list text-lg group-hover:text-black dark:group-hover:text-white"></i>
                Tasks
            </a>

            <a href="courses.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white hover:backdrop-blur-sm">
                <i class="lni lni-graduation text-lg group-hover:text-black dark:group-hover:text-white"></i>
                Courses
            </a>

            <a href="student-attendance.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group bg-white/60 dark:bg-white/10 text-black dark:text-white shadow-sm border border-white/40 dark:border-white/5 backdrop-blur-sm"
                aria-current="page">
                <i class="lni lni-checkmark-circle text-lg"></i>
                Attendance
            </a>

            <a href="student-grades.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white hover:backdrop-blur-sm">
                <i class="lni lni-stats-up text-lg group-hover:text-black dark:group-hover:text-white"></i>
                Grades
            </a>

            <a href="student-assignments.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white hover:backdrop-blur-sm">
                <i class="lni lni-files text-lg group-hover:text-black dark:group-hover:text-white"></i>
                Assignments
            </a>

            <a href="student-announcements.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white hover:backdrop-blur-sm">
                <i class="lni lni-bullhorn text-lg group-hover:text-black dark:group-hover:text-white"></i>
                Announcements
            </a>

            <a href="resources.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white hover:backdrop-blur-sm">
                <i class="lni lni-library text-lg group-hover:text-black dark:group-hover:text-white"></i>
                Resources
            </a>

            <a href="student-profile.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 group text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-800/50 hover:text-black dark:hover:text-white hover:backdrop-blur-sm">
                <i class="lni lni-user text-lg group-hover:text-black dark:group-hover:text-white"></i>
                Profile
            </a>
        </div>

        <div class="p-4 border-t border-gray-100/50 dark:border-gray-800/50 bg-white/40 dark:bg-gray-900/40 backdrop-blur-md">
            <button @click="darkMode = !darkMode" aria-label="Toggle Dark Mode"
                class="w-full flex items-center justify-center gap-2 mb-3 py-2 rounded-lg bg-white/50 dark:bg-gray-800/50 border border-white/20 dark:border-gray-700/30 text-gray-600 dark:text-gray-300 hover:bg-white/70 dark:hover:bg-gray-800/80 transition-colors shadow-sm">
                <i class="lni" :class="darkMode ? 'lni-night' : 'lni-sun'"></i>
                <span class="text-xs font-bold uppercase tracking-wider" x-text="darkMode ? 'Dark Mode' : 'Light Mode'"></span>
            </button>
            <a href="student-profile.html" class="flex items-center gap-3 p-2 rounded-xl hover:bg-white/50 dark:hover:bg-gray-800/50 transition-colors group">
                <div class="w-9 h-9 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center border border-gray-200 dark:border-gray-700 text-gray-400 font-bold text-xs uppercase shadow-sm group-hover:bg-white dark:group-hover:bg-gray-700 group-hover:shadow-md transition-all">
                    <span data-user-initials>AT</span>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold text-black dark:text-white truncate" data-user-name>Alex Thompson</p>
                    <p class="text-xs text-gray-500 truncate" data-user-role>CS Student - Year 3</p>
                </div>
                <i class="lni lni-cog text-gray-400 group-hover:text-black dark:group-hover:text-white transition-colors"></i>
            </a>
            <div class="mt-2 text-center">
                <button @click="logout()"
                    class="w-full flex items-center justify-center gap-2 text-xs font-bold text-gray-400 hover:text-red-600 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 py-2 rounded-lg transition-all uppercase tracking-tighter">
                    <i class="lni lni-exit"></i><span>Sign Out</span>
                </button>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 relative" x-data="attendancePage()" x-init="init()">

        <!-- Toast Notifications -->
        <div class="fixed top-4 right-4 z-[200] flex flex-col gap-2 pointer-events-none" aria-live="polite">
            <template x-for="toast in toasts" :key="toast.id">
                <div x-show="toast.visible"
                    x-transition:enter="transition ease-out duration-300"
                    x-transition:enter-start="opacity-0 translate-x-8"
                    x-transition:enter-end="opacity-100 translate-x-0"
                    x-transition:leave="transition ease-in duration-200"
                    x-transition:leave-start="opacity-100 translate-x-0"
                    x-transition:leave-end="opacity-0 translate-x-8"
                    :class="{
                        'bg-green-50 border-green-200 dark:bg-green-900/40 dark:border-green-700': toast.type==='success',
                        'bg-red-50 border-red-200 dark:bg-red-900/40 dark:border-red-700': toast.type==='error',
                        'bg-blue-50 border-blue-200 dark:bg-blue-900/40 dark:border-blue-700': toast.type==='info',
                        'bg-yellow-50 border-yellow-200 dark:bg-yellow-900/40 dark:border-yellow-700': toast.type==='warning'
                    }"
                    class="pointer-events-auto flex items-start gap-3 w-80 px-4 py-3 rounded-xl border shadow-lg">
                    <i :class="{
                        'lni lni-checkmark-circle text-green-500': toast.type==='success',
                        'lni lni-close-circle text-red-500': toast.type==='error',
                        'lni lni-information text-blue-500': toast.type==='info',
                        'lni lni-warning text-yellow-500': toast.type==='warning'
                    }" class="mt-0.5 text-lg flex-shrink-0"></i>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-semibold text-black dark:text-white" x-text="toast.title"></p>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5" x-text="toast.message"></p>
                    </div>
                    <button @click="dismissToast(toast.id)" class="text-gray-400 hover:text-black dark:hover:text-white transition-colors flex-shrink-0">
                        <i class="lni lni-close text-xs"></i>
                    </button>
                </div>
            </template>
        </div>

        <!-- Mobile Header -->
        <div class="lg:hidden h-14 border-b border-gray-100/50 dark:border-gray-800/50 flex items-center justify-between px-4 sticky top-0 bg-white/70 dark:bg-gray-900/80 backdrop-blur-xl z-20">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 bg-black dark:bg-white rounded-lg flex items-center justify-center text-white dark:text-black font-bold text-xs">AS</div>
                <span class="font-semibold text-black dark:text-white">Attendance</span>
            </div>
            <button @click="sidebarOpen = !sidebarOpen" class="p-2 text-gray-500 hover:text-black dark:hover:text-white rounded-md">
                <i class="ri-menu-line text-xl"></i>
            </button>
        </div>

        <main class="flex-1 overflow-y-auto scroll-smooth p-4 sm:p-6 lg:p-8 custom-scrollbar">
            <!-- Skeleton loading -->
            <div x-show="loading" class="max-w-5xl mx-auto pb-12 animate-pulse space-y-6">
                <div class="flex items-center justify-between">
                    <div class="space-y-2">
                        <div class="h-8 w-44 bg-gray-200 dark:bg-gray-700 rounded-xl"></div>
                        <div class="h-4 w-56 bg-gray-200 dark:bg-gray-700 rounded"></div>
                    </div>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                    <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-5 space-y-3"><div class="h-3 w-16 bg-gray-200 dark:bg-gray-700 rounded"></div><div class="h-10 w-16 bg-gray-200 dark:bg-gray-700 rounded-xl mx-auto"></div></div>
                    <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-5 space-y-3"><div class="h-3 w-16 bg-gray-200 dark:bg-gray-700 rounded"></div><div class="h-10 w-16 bg-gray-200 dark:bg-gray-700 rounded-xl mx-auto"></div></div>
                    <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-5 space-y-3"><div class="h-3 w-16 bg-gray-200 dark:bg-gray-700 rounded"></div><div class="h-10 w-16 bg-gray-200 dark:bg-gray-700 rounded-xl mx-auto"></div></div>
                    <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-5 space-y-3"><div class="h-3 w-16 bg-gray-200 dark:bg-gray-700 rounded"></div><div class="h-10 w-16 bg-gray-200 dark:bg-gray-700 rounded-xl mx-auto"></div></div>
                </div>
                <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 overflow-hidden">
                    <div class="p-5 border-b border-gray-100 dark:border-gray-700"><div class="h-4 w-36 bg-gray-200 dark:bg-gray-700 rounded"></div></div>
                    <div class="divide-y divide-gray-100 dark:divide-gray-800">
                        <div class="flex items-center gap-4 p-4"><div class="w-10 h-10 bg-gray-200 dark:bg-gray-700 rounded-xl shrink-0"></div><div class="flex-1 space-y-2"><div class="h-4 w-2/5 bg-gray-200 dark:bg-gray-700 rounded"></div><div class="h-3 w-1/4 bg-gray-200 dark:bg-gray-700 rounded"></div></div><div class="h-6 w-20 bg-gray-200 dark:bg-gray-700 rounded-full"></div></div>
                        <div class="flex items-center gap-4 p-4"><div class="w-10 h-10 bg-gray-200 dark:bg-gray-700 rounded-xl shrink-0"></div><div class="flex-1 space-y-2"><div class="h-4 w-3/5 bg-gray-200 dark:bg-gray-700 rounded"></div><div class="h-3 w-1/3 bg-gray-200 dark:bg-gray-700 rounded"></div></div><div class="h-6 w-20 bg-gray-200 dark:bg-gray-700 rounded-full"></div></div>
                        <div class="flex items-center gap-4 p-4"><div class="w-10 h-10 bg-gray-200 dark:bg-gray-700 rounded-xl shrink-0"></div><div class="flex-1 space-y-2"><div class="h-4 w-1/2 bg-gray-200 dark:bg-gray-700 rounded"></div><div class="h-3 w-1/4 bg-gray-200 dark:bg-gray-700 rounded"></div></div><div class="h-6 w-20 bg-gray-200 dark:bg-gray-700 rounded-full"></div></div>
                    </div>
                </div>
            </div>
            <div class="max-w-5xl mx-auto space-y-8 animate-fade-in-up pb-12" x-show="!loading">

                <!-- Header -->
                <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
                    <div>
                        <h1 class="text-3xl font-display font-bold text-black dark:text-white tracking-tight">My Attendance</h1>
                        <p class="text-gray-500 mt-1 text-sm">Track your attendance across all enrolled courses.</p>
                    </div>
                    <div class="flex items-center gap-2 text-sm text-gray-500 dark:text-gray-400 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-2.5 shadow-sm">
                        <i class="ri-calendar-line"></i>
                        <span x-text="today"></span>
                    </div>
                </div>

                <!-- Loading -->
                <div x-show="loading" class="flex items-center justify-center py-24 text-gray-400">
                    <i class="ri-loader-4-line animate-spin text-3xl mr-3"></i>
                    <span class="text-lg font-medium">Loading attendance…</span>
                </div>

                <!-- Content -->
                <template x-if="!loading">
                    <div class="space-y-8">

                        <!-- Overall Stats -->
                        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                            <!-- Overall % -->
                            <div class="col-span-2 bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-6 shadow-sm flex items-center gap-6">
                                <!-- Circular progress -->
                                <div class="relative w-20 h-20 flex-shrink-0">
                                    <svg class="w-20 h-20 -rotate-90" viewBox="0 0 80 80">
                                        <circle cx="40" cy="40" r="32" fill="none" stroke="#e5e7eb" stroke-width="8" class="dark:stroke-gray-700"/>
                                        <circle cx="40" cy="40" r="32" fill="none"
                                            :stroke="overallPct >= 75 ? '#22c55e' : overallPct >= 60 ? '#f59e0b' : '#ef4444'"
                                            stroke-width="8" stroke-linecap="round"
                                            :stroke-dasharray="201"
                                            :stroke-dashoffset="201 - (201 * overallPct / 100)"/>
                                    </svg>
                                    <div class="absolute inset-0 flex items-center justify-center">
                                        <span class="text-sm font-bold text-black dark:text-white" x-text="overallPct + '%'"></span>
                                    </div>
                                </div>
                                <div>
                                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Overall Attendance</p>
                                    <p class="text-3xl font-bold text-black dark:text-white" x-text="overallPct + '%'"></p>
                                    <p class="text-sm mt-1 font-medium"
                                        :class="overallPct >= 75 ? 'text-green-600 dark:text-green-400' : overallPct >= 60 ? 'text-yellow-600 dark:text-yellow-400' : 'text-red-600 dark:text-red-400'"
                                        x-text="overallPct >= 75 ? 'Good Standing' : overallPct >= 60 ? 'Needs Improvement' : 'At Risk — Below 60%'">
                                    </p>
                                </div>
                            </div>

                            <!-- Total Classes -->
                            <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-5 shadow-sm">
                                <div class="w-10 h-10 rounded-xl bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 flex items-center justify-center mb-3">
                                    <i class="ri-calendar-check-line text-lg"></i>
                                </div>
                                <h3 class="text-2xl font-bold text-black dark:text-white" x-text="totalClasses">—</h3>
                                <p class="text-xs text-gray-500 font-medium mt-1">Total Classes</p>
                            </div>

                            <!-- Present -->
                            <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-5 shadow-sm">
                                <div class="w-10 h-10 rounded-xl bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 flex items-center justify-center mb-3">
                                    <i class="ri-user-follow-line text-lg"></i>
                                </div>
                                <h3 class="text-2xl font-bold text-black dark:text-white" x-text="totalPresent">—</h3>
                                <p class="text-xs text-gray-500 font-medium mt-1">Present / On Time</p>
                            </div>
                        </div>

                        <!-- No data state -->
                        <div x-show="courses.length === 0" class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 p-16 text-center shadow-sm">
                            <div class="w-16 h-16 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i class="ri-calendar-close-line text-2xl text-gray-400"></i>
                            </div>
                            <h3 class="text-lg font-bold text-black dark:text-white mb-2">No Attendance Records</h3>
                            <p class="text-sm text-gray-500">Your attendance will appear here once your faculty starts recording classes.</p>
                        </div>

                        <!-- Per-Course Cards -->
                        <template x-for="course in courses" :key="course.course_id">
                            <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm overflow-hidden">

                                <!-- Course Header -->
                                <div class="px-6 py-5 border-b border-gray-100 dark:border-gray-700 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 rounded-xl bg-black dark:bg-white text-white dark:text-black flex items-center justify-center font-bold text-xs"
                                             x-text="course.course_code.substring(0,4)"></div>
                                        <div>
                                            <h3 class="font-bold text-black dark:text-white" x-text="course.course_name"></h3>
                                            <p class="text-xs text-gray-500" x-text="course.course_code"></p>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-4 flex-wrap">
                                        <div class="text-sm text-gray-500 dark:text-gray-400">
                                            <span class="font-bold text-black dark:text-white" x-text="course.present"></span>
                                            <span> / </span>
                                            <span x-text="course.total + ' classes'"></span>
                                        </div>
                                        <span class="px-3 py-1 rounded-full text-xs font-bold"
                                            :class="course.attendance_pct >= 75 ? 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400' : course.attendance_pct >= 60 ? 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-400' : 'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-400'"
                                            x-text="course.attendance_pct + '%'">
                                        </span>
                                    </div>
                                </div>

                                <!-- Progress Bar -->
                                <div class="px-6 py-3 bg-gray-50 dark:bg-gray-900/30 border-b border-gray-100 dark:border-gray-700">
                                    <div class="flex items-center gap-3">
                                        <div class="flex-1 h-2.5 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                                            <div class="h-full rounded-full transition-all duration-700"
                                                :class="course.attendance_pct >= 75 ? 'bg-green-500' : course.attendance_pct >= 60 ? 'bg-yellow-500' : 'bg-red-500'"
                                                :style="'width:' + course.attendance_pct + '%'"></div>
                                        </div>
                                        <span class="text-xs text-gray-400 w-10 text-right" x-text="course.attendance_pct + '%'"></span>
                                    </div>
                                </div>

                                <!-- Records Table -->
                                <template x-if="course.records && course.records.length > 0">
                                    <div class="overflow-x-auto">
                                        <table class="w-full text-sm">
                                            <thead class="bg-gray-50/70 dark:bg-gray-900/40">
                                                <tr class="text-xs font-bold text-gray-400 uppercase tracking-wider border-b border-gray-100 dark:border-gray-700">
                                                    <th class="px-6 py-3 text-left">Date</th>
                                                    <th class="px-6 py-3 text-left">Day</th>
                                                    <th class="px-6 py-3 text-left">Status</th>
                                                </tr>
                                            </thead>
                                            <tbody class="divide-y divide-gray-50 dark:divide-gray-800">
                                                <template x-for="rec in course.records" :key="rec.id || rec.date">
                                                    <tr class="hover:bg-gray-50/70 dark:hover:bg-gray-700/30 transition-colors">
                                                        <td class="px-6 py-3 text-gray-700 dark:text-gray-300 font-medium"
                                                            x-text="formatDate(rec.date)"></td>
                                                        <td class="px-6 py-3 text-gray-500 dark:text-gray-400"
                                                            x-text="getDayName(rec.date)"></td>
                                                        <td class="px-6 py-3">
                                                            <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-bold"
                                                                :class="{
                                                                    'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400': rec.status === 'present',
                                                                    'bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-400': rec.status === 'late',
                                                                    'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-400': rec.status === 'absent',
                                                                    'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300': !['present','late','absent'].includes(rec.status)
                                                                }">
                                                                <i :class="{
                                                                    'ri-check-line': rec.status === 'present',
                                                                    'ri-time-line': rec.status === 'late',
                                                                    'ri-close-line': rec.status === 'absent'
                                                                }"></i>
                                                                <span x-text="rec.status ? rec.status.charAt(0).toUpperCase() + rec.status.slice(1) : '—'"></span>
                                                            </span>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </template>

                                <!-- No records yet for this course -->
                                <template x-if="!course.records || course.records.length === 0">
                                    <div class="px-6 py-8 text-center text-gray-400">
                                        <i class="ri-calendar-line text-2xl mb-2 block"></i>
                                        <p class="text-sm">No attendance recorded yet for this course.</p>
                                    </div>
                                </template>
                            </div>
                        </template>

                    </div>
                </template>

            </div>
        </main>
    </div>

    <script src="../assets/js/api.js?v=2"></script>
    <script>
        function attendancePage() {
            return {
                loading: true,
                toasts: [], _toastId: 0,
                overallPct: 0,
                totalClasses: 0,
                totalPresent: 0,
                courses: [],
                today: new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }),

                async init() {
                    if (typeof window.api === 'undefined') return;
                    if (!window.api.checkAuth()) { window.location.href = 'student-login.html'; return; }
                    const user = window.api.getUserData();
                    if (user && user.role !== 'student') { window.api.clearToken(); window.location.href = 'student-login.html'; return; }
                    if (user) window.api.populateSidebar(user);

                    try {
                        const data = await window.api.getAttendance();
                        this.overallPct = Math.round(data.overall_attendance_pct || 0);
                        this.courses = (data.courses || []).map(c => ({
                            ...c,
                            attendance_pct: Math.round(c.attendance_pct || 0),
                        }));
                        this.totalClasses = this.courses.reduce((s, c) => s + (c.total || 0), 0);
                        this.totalPresent = this.courses.reduce((s, c) => s + (c.present || 0), 0);
                    } catch(e) {
                        console.warn('Could not load attendance:', e);
                        this.addToast('Warning', 'Could not load attendance data.', 'warning');
                    }
                    this.loading = false;
                },

                formatDate(dateStr) {
                    if (!dateStr) return '—';
                    const d = new Date(dateStr);
                    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                },

                getDayName(dateStr) {
                    if (!dateStr) return '';
                    return new Date(dateStr).toLocaleDateString('en-US', { weekday: 'long' });
                },

                addToast(title, message, type = 'info') {
                    const id = ++this._toastId;
                    this.toasts.push({ id, title, message, type, visible: false });
                    setTimeout(() => { const t = this.toasts.find(x => x.id===id); if(t) t.visible = true; }, 50);
                    setTimeout(() => this.dismissToast(id), 5000);
                },
                dismissToast(id) {
                    const t = this.toasts.find(x => x.id===id);
                    if (t) { t.visible = false; setTimeout(() => { this.toasts = this.toasts.filter(x => x.id!==id); }, 300); }
                }
            }
        }
    </script>
</body>
